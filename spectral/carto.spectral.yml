extends:
  - spectral:oas

rules:
  carto-info-title:
    description: CARTO API info.title SHOULD end with "API".
    given: $.info
    severity: warn
    then:
      field: title
      function: pattern
      functionOptions:
        match: ".*API$"

  carto-info-version:
    description: CARTO APIs MUST declare a semantic version.
    given: $.info
    severity: error
    then:
      field: version
      function: pattern
      functionOptions:
        match: "^\\d+\\.\\d+\\.\\d+(-.*)?$"

  carto-server-basepath-versioned:
    description: CARTO API server URL should include a /vN version segment.
    given: $.servers[*]
    severity: warn
    then:
      field: url
      function: pattern
      functionOptions:
        match: ".*/v\\d+.*"

  carto-security-oauth2-or-apikey:
    description: CARTO APIs must declare OAuth2 or API key security (CARTO supports both API Access Tokens and OAuth).
    given: $.components.securitySchemes
    severity: error
    then:
      function: truthy

  carto-error-response:
    description: CARTO operations should declare a 400 error response.
    given: $.paths[*][*].responses
    severity: warn
    then:
      field: "400"
      function: truthy

  carto-geojson-response:
    description: CARTO spatial endpoints should support GeoJSON response media type.
    given: $.paths[*][get,post].responses.200.content
    severity: info
    then:
      field: "application/geo+json"
      function: truthy

  carto-connection-parameter:
    description: CARTO SQL/Maps/Workflows operations should accept a connection name parameter.
    given: $.paths[*][get,post].parameters
    severity: info
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            properties:
              name:
                enum:
                  - connection_name
                  - connection

  carto-tag-descriptions:
    description: Each CARTO tag should carry a description.
    given: $.tags[*]
    severity: warn
    then:
      field: description
      function: truthy

  carto-operation-summary:
    description: Each CARTO operation should have a summary.
    given: $.paths[*][get,post,put,delete,patch]
    severity: warn
    then:
      field: summary
      function: truthy
